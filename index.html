<title>R6 Squad Leaderboard</title>
<style>
  :root {
    --bg: #15171c;
    --card: #1d2026;
    --card-hi: #23262e;
    --line: #2b2f38;
    --text: #eef0f3;
    --muted: #9ba3af;
    --faint: #6d7480;
    --accent: #f2c14e;
    --gold: #f2c14e;
    --emerald: #4ade80;
    --diamond: #b197fc;
    --champion: #f4626a;
    --plat: #4fd1d9;
    --silver: #b8c0cc;
    --bronze: #cd8f5c;
    --copper: #b0765d;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  :root[data-theme="light"] body, :root[data-theme="dark"] body, body {
    background: var(--bg);
    color: var(--text);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.55;
    background-image: radial-gradient(900px 420px at 50% -120px, rgba(242,193,78,0.07), transparent 70%);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1160px; margin: 0 auto; padding: 44px 22px 90px; }

  /* ---------- header ---------- */
  .overline {
    text-align: center;
    font-size: 12.5px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--faint); margin: 0;
  }
  header h1 {
    font-size: clamp(32px, 5.5vw, 46px);
    font-weight: 800; letter-spacing: -0.02em;
    text-align: center; line-height: 1.15;
    margin: 8px 0 6px; text-wrap: balance;
  }
  .sub { text-align: center; color: var(--muted); margin: 0; font-size: 15px; }
  .meta-row {
    display: flex; justify-content: center; gap: 8px 18px; margin-top: 14px;
    font-size: 13px; color: var(--faint); flex-wrap: wrap;
    font-variant-numeric: tabular-nums;
  }
  .meta-row b { color: var(--muted); font-weight: 600; }
  .meta-row .dot { color: var(--accent); }

  /* ---------- title cards ---------- */
  .titles {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    margin-top: 36px;
  }
  @media (max-width: 720px) { .titles { grid-template-columns: 1fr; } }
  .title-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 20px 22px;
  }
  .title-card .label {
    font-size: 12px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--faint);
  }
  .title-card .who {
    font-size: 26px; font-weight: 800; letter-spacing: -0.01em;
    margin-top: 8px; line-height: 1.15; overflow-wrap: anywhere;
  }
  .title-card .stat { font-size: 14px; margin-top: 4px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .title-card .stat b { color: var(--text); font-weight: 650; }

  /* ---------- view tabs ---------- */
  .tabs {
    display: inline-flex; gap: 4px; margin: 42px 0 0;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 999px; padding: 4px;
    flex-wrap: wrap;
  }
  .tab {
    font-family: var(--sans);
    font-size: 14px; font-weight: 600;
    color: var(--muted); background: transparent;
    border: none; border-radius: 999px;
    padding: 8px 18px; cursor: pointer;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: #17181c; background: var(--accent); }

  section h2 {
    display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
    font-size: 18px; font-weight: 700; letter-spacing: -0.01em;
    color: var(--text); margin: 22px 0 12px;
  }
  .hint { font-size: 13px; font-weight: 400; color: var(--faint); }

  /* ---------- table ---------- */
  .table-scroll {
    overflow-x: auto;
    border: 1px solid var(--line); border-radius: 16px;
    background: var(--card);
  }
  table { border-collapse: collapse; width: 100%; min-width: 940px; }
  thead th {
    font-size: 12.5px; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; color: var(--faint);
    text-align: right; padding: 14px 14px;
    border-bottom: 1px solid var(--line);
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  thead th:first-child, thead th:nth-child(2) { text-align: left; }
  thead th:hover { color: var(--text); }
  thead th .arrow { color: var(--accent); }
  tbody td {
    padding: 15px 14px; text-align: right;
    font-size: 14.5px; font-variant-numeric: tabular-nums;
    color: var(--text);
    border-bottom: 1px solid rgba(43,47,56,0.6);
    white-space: nowrap;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--card-hi); }
  td.pos { text-align: left; color: var(--faint); width: 44px; }
  td.player { text-align: left; }
  .player-cell { display: flex; align-items: center; gap: 13px; }
  .op-avatar {
    width: 44px; height: 44px; flex: none;
    border-radius: 11px; padding: 4px;
    background: radial-gradient(circle at 50% 35%, #f4f6f9, #dfe3ea);
    border: 1px solid var(--line);
    object-fit: contain;
  }
  .player-name {
    display: flex; flex-direction: column; gap: 1px;
    font-size: 15.5px; font-weight: 700; letter-spacing: -0.01em;
  }
  .player-op {
    font-size: 11.5px; font-weight: 500; letter-spacing: 0.01em;
    color: var(--faint);
  }
  .plat-chip {
    display: inline-block; margin-left: 8px; padding: 1px 7px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    color: var(--muted); background: var(--card-hi);
    border: 1px solid var(--line); border-radius: 999px;
    vertical-align: 1px;
  }
  .rank-pill {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 700;
  }
  .rank-pill .tier-mark {
    width: 9px; height: 9px; display: inline-block; border-radius: 2px;
    transform: rotate(45deg);
  }
  .best { color: var(--gold); font-weight: 700; }
  .best::after { content: " ★"; font-size: 10.5px; vertical-align: 1px; }

  footer {
    margin-top: 44px; text-align: center;
    font-size: 13px; color: var(--faint);
  }
  footer .sep { color: var(--accent); margin: 0 8px; }
  @media (prefers-reduced-motion: no-preference) {
    .title-card { transition: border-color 0.15s ease; }
    .title-card:hover { border-color: #3a3f4a; }
    .tab { transition: color 0.12s ease, background 0.12s ease; }
    tbody td { transition: background 0.1s ease; }
  }
</style>

<div class="wrap">
  <header>
    <p class="overline">Rainbow Six Siege</p>
    <h1>Squad Leaderboard</h1>
    <p class="sub">The boys, settled with numbers.</p>
    <div class="meta-row">
      <span>Season <b id="season">—</b></span>
      <span class="dot">◆</span>
      <span>Updated <b id="updated">—</b></span>
      <span class="dot">◆</span>
      <span id="playerCount">—</span>
    </div>
  </header>

  <div class="titles">
    <div class="title-card rank">
      <div class="label">Highest Rank</div>
      <div class="who" id="bestRankName">—</div>
      <div class="stat" id="bestRankStat">—</div>
    </div>
    <div class="title-card kd">
      <div class="label">Top K/D</div>
      <div class="who" id="bestKdName">—</div>
      <div class="stat" id="bestKdStat">—</div>
    </div>
    <div class="title-card wr">
      <div class="label">Top Win Rate</div>
      <div class="who" id="bestWrName">—</div>
      <div class="stat" id="bestWrStat">—</div>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>

  <section>
    <h2 id="viewTitle">Season ranked <span class="hint">click a column to sort</span></h2>
    <div class="table-scroll">
      <table id="board">
        <thead><tr></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <footer>
    Private board <span class="sep">·</span> stats via Ubisoft ranked data <span class="sep">·</span> bragging rights non-refundable
  </footer>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────
// Pulled from R6 Tracker profiles. season = Y11S2 (System Override) ranked;
// ranked = lifetime ranked; overall = lifetime all playlists.
const UPDATED = "Jul 10, 2026";
const SEASON = "Y11S2 · System Override";

const PLAYERS = [
  { name: "Prawn1234", plat: "PC",
    season: { rank: "Silver 2", rp: 2300, peak: 2549, wins: 43, losses: 50, winrate: 46.2, kd: 1.21, kda: 1.59, kills: 519, deaths: 429, hs: 51.1, aces: 1, clutches: 15, clutchPct: 23.8, esr: 0.60, abandons: 0 },
    ranked: { matches: 1236, wins: 616, losses: 401, winrate: 49.8, kd: 1.00, kills: 5415, deaths: 5437, kpm: 4.38, abandons: 8 },
    overall: { level: 260, hours: 548, matches: 2663, wins: 1344, losses: 1247, winrate: 50.5, kd: 1.07, hs: 44.2, kills: 10891, deaths: 10169, kpm: 4.09, abandons: 66 } },
  { name: "preludexx", plat: "PC",
    season: { rank: "Silver 3", rp: 2220, peak: 2252, wins: 48, losses: 43, winrate: 52.7, kd: 1.17, kda: 1.44, kills: 469, deaths: 401, hs: 60.6, aces: 4, clutches: 13, clutchPct: 20.0, esr: 0.53, abandons: 0 },
    ranked: { matches: 91, wins: 48, losses: 43, winrate: 52.8, kd: 1.17, kills: 469, deaths: 401, kpm: 5.15, abandons: 0 },
    overall: { level: 76, hours: 121, matches: 221, wins: 108, losses: 99, winrate: 48.9, kd: 1.07, hs: 55.3, kills: 905, deaths: 843, kpm: 4.10, abandons: 14 } },
  { name: "bennyxswish", plat: "PC",
    season: { rank: "Silver 4", rp: 2111, peak: 2175, wins: 116, losses: 103, winrate: 53.0, kd: 1.09, kda: 1.39, kills: 1020, deaths: 933, hs: 49.9, aces: 6, clutches: 40, clutchPct: 28.0, esr: 0.46, abandons: 0 },
    ranked: { matches: 465, wins: 232, losses: 231, winrate: 49.9, kd: 1.02, kills: 2000, deaths: 1967, kpm: 4.30, abandons: 2 },
    overall: { level: 139, hours: 314, matches: 716, wins: 351, losses: 344, winrate: 49.0, kd: 0.97, hs: 43.0, kills: 2767, deaths: 2850, kpm: 3.86, abandons: 21 } },
  { name: "GymPiggy", plat: "PC",
    season: { rank: "Silver 4", rp: 2100, peak: 2134, wins: 98, losses: 73, winrate: 57.3, kd: 1.10, kda: 1.46, kills: 761, deaths: 692, hs: 40.3, aces: 1, clutches: 21, clutchPct: 17.5, esr: 0.51, abandons: 0 },
    ranked: { matches: 316, wins: 163, losses: 150, winrate: 51.6, kd: 0.96, kills: 1292, deaths: 1342, kpm: 4.09, abandons: 3 },
    overall: { level: 112, hours: 197, matches: 479, wins: 232, losses: 224, winrate: 48.4, kd: 0.94, hs: 36.4, kills: 1817, deaths: 1934, kpm: 3.79, abandons: 23 } },
  { name: "Abinboi", plat: "PC",
    season: { rank: "Bronze 1", rp: 1949, peak: 2002, wins: 101, losses: 72, winrate: 58.4, kd: 1.03, kda: 1.38, kills: 770, deaths: 750, hs: 53.2, aces: 1, clutches: 19, clutchPct: 26.4, esr: 0.43, abandons: 0 },
    ranked: { matches: 385, wins: 192, losses: 193, winrate: 49.9, kd: 0.89, kills: 1571, deaths: 1761, kpm: 4.08, abandons: 0 },
    overall: { level: 130, hours: 322, matches: 655, wins: 331, losses: 314, winrate: 50.5, kd: 0.92, hs: 41.1, kills: 2519, deaths: 2745, kpm: 3.85, abandons: 10 } },
  { name: "cancerous_CURRY", plat: "PS",
    season: { rank: "Bronze 3", rp: 1749, peak: 1952, wins: 7, losses: 13, winrate: 35.0, kd: 0.57, kda: 0.82, kills: 47, deaths: 83, hs: 40.4, aces: 0, clutches: 2, clutchPct: 18.2, esr: 0.32, abandons: 0 },
    ranked: { matches: 20, wins: 7, losses: 13, winrate: 35.0, kd: 0.57, kills: 47, deaths: 83, kpm: 2.35, abandons: 0 },
    overall: { level: 70, hours: 76, matches: 96, wins: 42, losses: 47, winrate: 43.8, kd: 0.79, hs: 37.1, kills: 236, deaths: 300, kpm: 2.46, abandons: 7 } },
  { name: "MegaGBez", plat: "PS",
    season: { rank: "Copper 5", rp: 1007, peak: 1116, wins: 10, losses: 19, winrate: 34.5, kd: 0.16, kda: 0.30, kills: 24, deaths: 147, hs: 29.2, aces: 0, clutches: 0, clutchPct: 0.0, esr: 0.06, abandons: 0 },
    ranked: { matches: 79, wins: 20, losses: 56, winrate: 25.3, kd: 0.17, kills: 66, deaths: 397, kpm: 0.84, abandons: 3 },
    overall: { level: 77, hours: 89, matches: 249, wins: 94, losses: 141, winrate: 37.8, kd: 0.26, hs: 30.2, kills: 294, deaths: 1152, kpm: 1.18, abandons: 14 } },
];
// ─────────────────────────────────────────────────────────────────────

// Each player's signature operator (avatar shown by their name).
// Kept separate from PLAYERS so the daily stat-refresh never touches it.
const OPERATORS = {
  "Prawn1234": "frost",
  "preludexx": "valkyrie",
  "bennyxswish": "warden",
  "GymPiggy": "mute",
  "Abinboi": "finka",
  "cancerous_CURRY": "thorn",
  "MegaGBez": "montagne",
};
const opLabel = op => op ? op.charAt(0).toUpperCase() + op.slice(1) : "";

const TIER_COLORS = {
  copper: "var(--copper)", bronze: "var(--bronze)", silver: "var(--silver)",
  gold: "var(--gold)", platinum: "var(--plat)", emerald: "var(--emerald)",
  diamond: "var(--diamond)", champion: "var(--champion)",
};
const tierColor = rank => TIER_COLORS[rank.split(" ")[0].toLowerCase()] || "var(--muted)";
PLAYERS.forEach(p => {
  const s = p.season;
  s.matches = s.wins + s.losses;
  s.kpm = s.matches ? +(s.kills / s.matches).toFixed(2) : 0;
});

const fmtInt = v => v.toLocaleString();
const fmt1 = v => v.toFixed(1);
const fmt2 = v => v.toFixed(2);
const pct = v => v.toFixed(1) + "%";

// Column defs per view. best:"max" = highlight the highest value.
const VIEWS = {
  season: {
    title: "Season ranked — " + SEASON,
    cols: [
      { key: "rp", label: "Rank", best: "max", html: p => '<span class="rank-pill" style="color:' + tierColor(p.season.rank) + '"><span class="tier-mark" style="background:' + tierColor(p.season.rank) + '"></span>' + p.season.rank + " · " + fmtInt(p.season.rp) + "</span>", val: p => p.season.rp },
      { key: "peak", label: "Peak RP", best: "max", val: p => p.season.peak, fmt: fmtInt },
      { key: "wl", label: "W–L", best: "max", val: p => p.season.wins, fmt: (v, p) => p.season.wins + "–" + p.season.losses },
      { key: "winrate", label: "Win %", best: "max", val: p => p.season.winrate, fmt: pct },
      { key: "kd", label: "K/D", best: "max", val: p => p.season.kd, fmt: fmt2 },
      { key: "kda", label: "KDA", best: "max", val: p => p.season.kda, fmt: fmt2 },
      { key: "kills", label: "Kills", best: "max", val: p => p.season.kills, fmt: fmtInt },
      { key: "deaths", label: "Deaths", val: p => p.season.deaths, fmt: fmtInt },
      { key: "hs", label: "HS %", best: "max", val: p => p.season.hs, fmt: pct },
      { key: "aces", label: "Aces", best: "max", val: p => p.season.aces },
      { key: "clutches", label: "Clutches", best: "max", val: p => p.season.clutches, fmt: (v, p) => v + " (" + fmt1(p.season.clutchPct) + "%)" },
      { key: "esr", label: "ESR", best: "max", val: p => p.season.esr, fmt: fmt2 },
      { key: "kpm", label: "K/Match", best: "max", val: p => p.season.kpm, fmt: fmt2 },
    ],
  },
  ranked: {
    title: "Lifetime ranked",
    cols: [
      { key: "matches", label: "Matches", best: "max", val: p => p.ranked.matches, fmt: fmtInt },
      { key: "wl", label: "W–L", best: "max", val: p => p.ranked.wins, fmt: (v, p) => p.ranked.wins + "–" + p.ranked.losses },
      { key: "winrate", label: "Win %", best: "max", val: p => p.ranked.winrate, fmt: pct },
      { key: "kd", label: "K/D", best: "max", val: p => p.ranked.kd, fmt: fmt2 },
      { key: "kills", label: "Kills", best: "max", val: p => p.ranked.kills, fmt: fmtInt },
      { key: "deaths", label: "Deaths", val: p => p.ranked.deaths, fmt: fmtInt },
      { key: "kpm", label: "K/Match", best: "max", val: p => p.ranked.kpm, fmt: fmt2 },
      { key: "abandons", label: "Abandons", val: p => p.ranked.abandons },
    ],
  },
  overall: {
    title: "Lifetime overall — all playlists",
    cols: [
      { key: "level", label: "Level", best: "max", val: p => p.overall.level, fmt: fmtInt },
      { key: "hours", label: "Time", val: p => p.overall.hours, fmt: v => v + "h" },
      { key: "matches", label: "Matches", best: "max", val: p => p.overall.matches, fmt: fmtInt },
      { key: "wl", label: "W–L", best: "max", val: p => p.overall.wins, fmt: (v, p) => fmtInt(p.overall.wins) + "–" + fmtInt(p.overall.losses) },
      { key: "winrate", label: "Win %", best: "max", val: p => p.overall.winrate, fmt: pct },
      { key: "kd", label: "K/D", best: "max", val: p => p.overall.kd, fmt: fmt2 },
      { key: "hs", label: "HS %", best: "max", val: p => p.overall.hs, fmt: pct },
      { key: "kills", label: "Kills", best: "max", val: p => p.overall.kills, fmt: fmtInt },
      { key: "deaths", label: "Deaths", val: p => p.overall.deaths, fmt: fmtInt },
      { key: "kpm", label: "K/Match", best: "max", val: p => p.overall.kpm, fmt: fmt2 },
      { key: "abandons", label: "Abandons", val: p => p.overall.abandons },
    ],
  },
};
const TAB_LABELS = { season: "Season Ranked", ranked: "Lifetime Ranked", overall: "Lifetime Overall" };

// header + title cards (always season-based)
document.getElementById("updated").textContent = UPDATED;
document.getElementById("season").textContent = SEASON;
document.getElementById("playerCount").textContent = PLAYERS.length + " players tracked";

const topBy = fn => PLAYERS.reduce((a, b) => (fn(b) > fn(a) ? b : a));
const bestRank = topBy(p => p.season.rp), bestKd = topBy(p => p.season.kd), bestWr = topBy(p => p.season.winrate);
document.getElementById("bestRankName").textContent = bestRank.name;
document.getElementById("bestRankName").style.color = tierColor(bestRank.season.rank);
document.getElementById("bestRankStat").innerHTML = "<b>" + bestRank.season.rank + "</b> · " + fmtInt(bestRank.season.rp) + " RP";
document.getElementById("bestKdName").textContent = bestKd.name;
document.getElementById("bestKdStat").innerHTML = "<b>" + fmt2(bestKd.season.kd) + "</b> K/D · " + fmtInt(bestKd.season.kills) + " kills";
document.getElementById("bestWrName").textContent = bestWr.name;
document.getElementById("bestWrStat").innerHTML = "<b>" + pct(bestWr.season.winrate) + "</b> over " + bestWr.season.matches + " matches";

let view = "season", sortKey = "rp", sortDir = -1;

function renderTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";
  Object.keys(VIEWS).forEach(v => {
    const b = document.createElement("button");
    b.className = "tab" + (v === view ? " active" : "");
    b.textContent = TAB_LABELS[v];
    b.addEventListener("click", () => {
      view = v;
      sortKey = VIEWS[v].cols[0].key;
      sortDir = -1;
      renderTabs(); render();
    });
    tabs.appendChild(b);
  });
}

function render() {
  const cfg = VIEWS[view];
  document.getElementById("viewTitle").innerHTML = cfg.title + ' <span class="hint">click a column to sort</span>';

  const headRow = document.querySelector("#board thead tr");
  headRow.innerHTML = "";
  const thPos = document.createElement("th"); thPos.textContent = "#";
  const thName = document.createElement("th"); thName.textContent = "Player"; thName.dataset.key = "name";
  headRow.append(thPos, thName);
  cfg.cols.forEach(c => {
    const th = document.createElement("th");
    th.dataset.key = c.key;
    th.innerHTML = c.key === sortKey ? c.label + ' <span class="arrow">' + (sortDir < 0 ? "▼" : "▲") + "</span>" : c.label;
    headRow.appendChild(th);
  });
  if (sortKey === "name") thName.innerHTML = 'Player <span class="arrow">' + (sortDir < 0 ? "▼" : "▲") + "</span>";
  headRow.querySelectorAll("th").forEach(th => {
    const key = th.dataset.key;
    if (!key) return;
    th.addEventListener("click", () => {
      if (sortKey === key) sortDir *= -1;
      else { sortKey = key; sortDir = key === "name" ? 1 : -1; }
      render();
    });
  });

  const getVal = p => {
    if (sortKey === "name") return p.name.toLowerCase();
    const col = cfg.cols.find(c => c.key === sortKey);
    return col ? col.val(p) : 0;
  };
  const rows = [...PLAYERS].sort((a, b) => {
    const va = getVal(a), vb = getVal(b);
    return (typeof va === "string" ? va.localeCompare(vb) : va - vb) * sortDir;
  });

  const bests = {};
  cfg.cols.forEach(c => { if (c.best === "max") bests[c.key] = Math.max(...PLAYERS.map(c.val)); });

  const tbody = document.querySelector("#board tbody");
  tbody.innerHTML = "";
  rows.forEach((p, i) => {
    const tr = document.createElement("tr");
    const posTd = document.createElement("td");
    posTd.className = "pos"; posTd.textContent = String(i + 1).padStart(2, "0");
    const nameTd = document.createElement("td");
    nameTd.className = "player";
    const op = OPERATORS[p.name];
    nameTd.innerHTML =
      '<div class="player-cell">' +
        (op ? '<img class="op-avatar" src="ops/' + op + '.svg" alt="' + opLabel(op) + '" title="' + opLabel(op) + '" loading="lazy">' : "") +
        '<span class="player-name">' +
          '<span>' + p.name + '<span class="plat-chip">' + p.plat + "</span></span>" +
          '<span class="player-op">' + opLabel(op) + "</span>" +
        "</span>" +
      "</div>";
    tr.append(posTd, nameTd);
    cfg.cols.forEach(c => {
      const td = document.createElement("td");
      const raw = c.val(p);
      if (c.html) td.innerHTML = c.html(p);
      else td.textContent = c.fmt ? c.fmt(raw, p) : String(raw);
      if (bests[c.key] !== undefined && raw === bests[c.key]) td.classList.add("best");
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

renderTabs();
render();
</script>
